name: Deploy FastAPI to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to correct directory (IMPORTANT: use full path)
            cd /home/ubuntu/nit/dops-1

            # Pull latest code
            git pull origin main

            # Install required packages (only if missing)
            sudo apt update
            sudo apt install -y python3.12-venv python3-pip

            # Create venv if not exists
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            # Activate venv
            source venv/bin/activate

            # Install dependencies
            pip install --upgrade pip
            pip install -r requirements.txt

            # Kill existing server (avoid error if not running)
            pkill -f uvicorn || true

            # Run FastAPI in background
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > log.txt 2>&1 &